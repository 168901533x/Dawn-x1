<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给姐姐请安</title>
  <style>
    :root {
      --bg1: #ffd4e6;
      --bg2: #ff8fbe;
      --bg3: #ffb6d5;
      --card: rgba(255, 255, 255, 0.92);
      --text-main: #3d2a2f;
      --text-sub: #7b5b64;
      --accent: #ff7ca8;
      --accent-soft: #ffd7e4;
      --shadow: 0 12px 30px rgba(120, 70, 90, 0.18);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      background: linear-gradient(145deg, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
      display: grid;
      place-items: center;
      padding: 18px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .liquid-bg {
      position: absolute;
      inset: -24vmax;
      pointer-events: none;
      z-index: -1;
      filter: blur(12px) saturate(115%);
    }

    .blob {
      position: absolute;
      border-radius: 44% 56% 60% 40% / 45% 39% 61% 55%;
      opacity: 0.62;
      mix-blend-mode: screen;
      animation: blobMorph 8s ease-in-out infinite, blobDrift 18s linear infinite;
    }

    .blob-1 {
      width: 46vmax;
      height: 46vmax;
      left: 4vmax;
      top: 2vmax;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.65), rgba(255, 156, 201, 0.2) 60%, rgba(255, 156, 201, 0));
    }

    .blob-2 {
      width: 52vmax;
      height: 52vmax;
      right: 2vmax;
      top: 12vmax;
      animation-delay: -2.5s;
      background: radial-gradient(circle at 65% 40%, rgba(255, 167, 214, 0.65), rgba(255, 112, 182, 0.24) 58%, rgba(255, 112, 182, 0));
    }

    .blob-3 {
      width: 44vmax;
      height: 44vmax;
      left: 24vmax;
      bottom: 4vmax;
      animation-delay: -5s;
      background: radial-gradient(circle at 40% 60%, rgba(255, 215, 232, 0.58), rgba(255, 146, 193, 0.26) 60%, rgba(255, 146, 193, 0));
    }

    .blob-4 {
      width: 40vmax;
      height: 40vmax;
      right: 20vmax;
      bottom: -8vmax;
      animation-delay: -7s;
      background: radial-gradient(circle at 52% 44%, rgba(255, 248, 252, 0.7), rgba(255, 175, 213, 0.24) 58%, rgba(255, 175, 213, 0));
    }

    @keyframes blobMorph {
      from {
        border-radius: 44% 56% 60% 40% / 45% 39% 61% 55%;
        transform: scale(1);
      }

      50% {
        border-radius: 60% 40% 52% 48% / 44% 56% 42% 58%;
        transform: scale(1.06);
      }

      to {
        border-radius: 48% 52% 42% 58% / 60% 43% 57% 40%;
        transform: scale(0.97);
      }
    }

    @keyframes blobDrift {
      from {
        transform: translate3d(-2vmax, 0.5vmax, 0) rotate(0deg);
      }

      50% {
        transform: translate3d(2vmax, -1.8vmax, 0) rotate(180deg);
      }

      to {
        transform: translate3d(-2vmax, 0.5vmax, 0) rotate(360deg);
      }
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(100%, 720px);
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(4px);
    }

    .image-wrap {
      margin: 0;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, #ffe3ed, #ffeede);
      display: grid;
      place-items: center;
      color: var(--text-sub);
      font-size: 15px;
      text-align: center;
      padding: 16px;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .content {
      padding: 26px 20px 30px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #a34d6e;
      font-size: 13px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.25;
      letter-spacing: 1px;
      color: #4b2d39;
    }

    .subtitle {
      margin: 12px auto 0;
      font-size: clamp(15px, 4.2vw, 18px);
      line-height: 1.8;
      color: var(--text-sub);
      max-width: 32em;
    }

    .divider {
      width: 72px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(to right, #ffd2e2, var(--accent));
      margin: 18px auto 16px;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 13px;
      color: #9b7a83;
    }

    @media (max-width: 420px) {
      body {
        padding: 12px;
      }

      .content {
        padding: 22px 16px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="liquid-bg" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
    <span class="blob blob-4"></span>
  </div>
  <main class="card">
    <figure class="image-wrap">
      <!-- 把下面 src 改成你的图片地址即可 -->
      <img
        class="hero-image"
        src="./1.jpg"
        alt="祝福图片"
      />
      <!-- 如果你暂时不想显示图片，可删掉 img 标签，仅保留这段提示文字 -->
      <!-- 这里将放你的图片 -->
    </figure>

    <section class="content">
      <span class="badge">今日份请安</span>
      <h1>给姐姐请安</h1>
      <div class="divider"></div>
      <p class="subtitle">
        姐姐驾到，弟弟在线请安！<br />
        祝你今天快乐翻倍，烦恼退退退。
      </p>
      <p class="footer-note">温馨提示：看到这条请安，今天运气 +100。</p>
    </section>
  </main>
</body>
</html>
